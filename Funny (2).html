<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Good Morning Antara</title>
<style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;display:flex;justify-content:center;align-items:center;background:radial-gradient(circle,#120c56,#000428,#004e92);font-family:Arial,sans-serif;overflow:hidden;position:relative;padding:16px}
#effects{position:fixed;inset:0;pointer-events:none}.spark,.heart{position:absolute}.spark{width:7px;height:7px;border-radius:50%;animation:explode 1.5s ease-out forwards}.heart{color:#ff4d88;animation:float 7s linear infinite;opacity:.85}
@keyframes explode{0%{transform:translate(0,0) scale(0);opacity:1}100%{transform:translate(var(--x),var(--y)) scale(2);opacity:0}}@keyframes float{0%{transform:translateY(110vh) scale(.6)}100%{transform:translateY(-10vh) scale(1.3);opacity:0}}
.card{display:none;width:100%;max-width:420px;background:rgba(255,255,255,.14);backdrop-filter:blur(14px);padding:24px;border-radius:28px;text-align:center;box-shadow:0 15px 35px rgba(0,0,0,.35);animation:fadeIn 1.2s ease forwards}.photo{width:110px;height:110px;border-radius:50%;object-fit:cover;border:4px solid rgba(255,255,255,.8);margin:0 auto 14px;display:block}h1{font-size:clamp(2rem,8vw,3rem);margin:0;color:#fff;min-height:60px;line-height:1.15}p{font-size:clamp(1rem,4.5vw,1.3rem);color:#ffe6f2;margin:10px 0}.name{color:#fff7a8;font-weight:bold;font-size:clamp(1rem,4vw,1.15rem)}@keyframes fadeIn{from{opacity:0;transform:scale(.75)}to{opacity:1;transform:scale(1)}}
</style>
</head>
<body>
<div id='effects'></div>
<div class='card' id='card'>
<img class='photo' src='https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=400' alt='Antara'>
<h1 id='typing'></h1>
<p>Have a Nice Weekend 💖</p>
<div class='name'>From Suryakant 💑</div>
</div>
<audio id='bgm' autoplay loop controls style='position:fixed;bottom:10px;left:10px;width:260px;z-index:9'>
<source src='https://www.learningcontainer.com/wp-content/uploads/2020/02/Kalimba.mp3' type='audio/mpeg'>
</audio>
<script>
const fx=document.getElementById('effects');for(let i=0;i<160;i++){let s=document.createElement('div');s.className='spark';s.style.left='50%';s.style.top='50%';s.style.background=`hsl(${Math.random()*360},100%,70%)`;s.style.setProperty('--x',`${(Math.random()-.5)*900}px`);s.style.setProperty('--y',`${(Math.random()-.5)*900}px`);s.style.animationDelay=`${Math.random()*.5}s`;fx.appendChild(s);}for(let i=0;i<28;i++){let h=document.createElement('div');h.className='heart';h.innerHTML='❤';h.style.left=Math.random()*100+'vw';h.style.animationDelay=Math.random()*7+'s';h.style.fontSize=(14+Math.random()*20)+'px';fx.appendChild(h);}setTimeout(()=>{card.style.display='block';typeText();},1500);
const text='Good Morning Antara ☀️';let idx=0;function typeText(){if(idx<text.length){typing.innerHTML+=text.charAt(idx++);setTimeout(typeText,85);}}
const bgm=document.getElementById('bgm');window.addEventListener('load',()=>bgm.play().catch(()=>{}));document.addEventListener('click',()=>bgm.play(),{once:true});
</script>
</body>
</html>
